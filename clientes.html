<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet"href="estilo.css">
    <title>SisSenai-Cadastro de Clientes</title>
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="clientes.html">Clientes</a>
      <a href="produtos.html">Clientes</a>
      <a href="vendas.html">Vendas</a>
                <a href="consulta_vendas.html">Consulta Vendas</a>  
    </nav>
    <header class="banner">
      <h1>Gestão de Clientes</h1>
      <p>Cadastro e gerencie sua base de contatos</p>
    </header>
    <div class="container">
      <div class="card">
        <h2>Novo Cadastro</h2>
        <form action="/salvar-cliente"method="POST">
          <input type="text"name= "nome"placeholder="Nome do Cliente" required>
          <input type="text"name= "cpf"placeholder="CPF/CNPJ" required>
          <input type="tel"name= "telefone"placeholder="Telefone" required>
          <button type="submit">Salvar Cliente</button>
        </form>
      </div>
      <div class="card"style="margin-top:20px;">
        <h2>Clientes Cadastrados</h2>
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>CPF/CNPJ</th>
              <th>Telefone</th>
              <th>Ações</th>!
            </tr>
          </thead>
          <tbody id="lista-clientes">
          </tbody>
        </table>
      </div>
    </div>
    <script>
      fetch('/listar-clientes')
      .then(res=>res.json())
      .then(clientes=>{
        const corpoTabela=document.getElementByld('list-clientes');
        clientes.forEach(c=>{
          corpoTabela.innerHTML +=`
            <tr>
            <td>${c.nome}</td>
            <td>${c.cpf}</td>
            <td>${c.telefone}</td>
            <td>
            <button onclick="prepararEdicao(${c.id},'${c.nome}','${c.cpf}',${c.telefone}')"
            style="width:auto;background:orange;padding:5px 10px;margin-right:5px;">✏️</button>
            <button onclick="excluirCliente(${c.id})"
            style="windth:auto;background:red;padding:5px 10px;">🗑️</button>
            </td>
        </tr>`;
      });
    });
      }
      //Lógica para Salvar(Novo ou Edição) Acrescentard tudo
      document.getElementByld('form-cliente').onsubmit=function(e){
        e.preventDefault(),
          const id=this.dataset.id;// Verifica sew há um ID guardado para edição
        const dados= {
          nome: this.nome.value,
          cpf: this.cpf.value,
          telefone: this.telefone.value
         }
        const url=id ?'PUT':'POST';
        fetch(url,{
          method:metodo,
          headers: {'Content-Type':'application/json'},
          body:JSON.stringify(dados)
        }).then(()=>{
          alert(id ?"Cliente alterado!" :"Cliente salvo!");
          location.reloand();
        });
      };
        
   </script>
  </body>
  <footer class="rodape">
    <div class="container-rodape">
      <p>&copy;2026 SisSenai- Sistema de Gestão Educacional</p>
      <p>Desenvolvido para fins didáticos- Unidade SENAI Capanema/PR</p>
    </div>
  </footer>
</html>
